<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustCollab AI - API Keys</title>

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/settings.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-content">

        <div class="settings-container">

            <div id="settings-sidebar-container"></div>

            <div class="settings-content">

                <h2 class="settings-heading">
                    API Keys
                </h2>

                <div class="api-card">

                    <div class="api-header">

                        <div>
                            <h3>Workspace API Access</h3>
                            <p>
                                Manage API tokens for integrations
                            </p>
                        </div>

                        <button class="primary-btn">
                            Generate New Key
                        </button>

                    </div>

                    <div class="api-table">

                        <div class="api-row">

                            <div>
                                <strong>Production Key</strong>
                                <p>tc_live_xxxxxxxxxxxx</p>
                            </div>

                            <span class="api-status active-status">
                                Active
                            </span>

                        </div>

                        <div class="api-row">

                            <div>
                                <strong>Development Key</strong>
                                <p>tc_dev_xxxxxxxxxxxx</p>
                            </div>

                            <span class="api-status active-status">
                                Active
                            </span>

                        </div>

                        <div class="api-row">

                            <div>
                                <strong>Legacy Key</strong>
                                <p>tc_old_xxxxxxxxxxxx</p>
                            </div>

                            <span class="api-status inactive-status">
                                Revoked
                            </span>

                        </div>

                    </div>

                </div>

                <div class="usage-card">

                    <h3>API Usage</h3>

                    <div class="usage-item">
                        <span>Requests Today</span>
                        <strong>24,581</strong>
                    </div>

                    <div class="usage-item">
                        <span>Rate Limit</span>
                        <strong>100,000/day</strong>
                    </div>

                    <div class="usage-item">
                        <span>Success Rate</span>
                        <strong>99.8%</strong>
                    </div>

                    <div class="usage-item">
                        <span>Last Request</span>
                        <strong>2 mins ago</strong>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="../../js/sidebar-loader.js"></script>
    <script src="../../js/settings.js"></script>
    <script src="../../js/settings-sidebar-loader.js"></script>

</body>
</html>
