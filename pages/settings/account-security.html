<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TrustCollab AI - Security Settings</title>

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/settings.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-content">

        <div class="settings-container">

            <div id="settings-sidebar-container"></div>

            <div class="settings-content">

                <h2 class="settings-heading">
                    Security Settings
                </h2>

                <div class="device-card">
                    <div class="device-header">
                        <div>
                            <h3>🔑 Change Password</h3>
                            <p> Ensure your account is using a long, random password to stay secure.</p>
                        </div>
                    </div>
                    <div style="margin-top: 1.25rem;">
                        <button class="danger-btn" style="background-color: #4f46e5; border-color: #4f46e5;">
                            Update Password
                        </button>
                    </div>
                </div>

                <div class="device-card current-device" style="margin-top: 1.5rem;">
                    <div class="device-header">
                        <div>
                            <h3>🛡 Two-Factor Authentication (2FA)</h3>
                            <p>Add an extra layer of verification protection to your administrative workspace login.</p>
                        </div>
                        <span class="device-badge" style="background-color: #ef4444; color: white;">
                            Disabled
                        </span>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="../../js/sidebar-loader.js"></script>
    <script src="../../js/settings-sidebar-loader.js"></script>

</body>

</html>
