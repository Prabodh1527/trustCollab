<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TrustCollab AI - Account Security</title>

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/settings.css">

</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-content">

        <div class="settings-container">

            <div id="settings-sidebar-container"></div>

            <div class="settings-content">

                <h2 class="settings-heading">
                    Account Security
                </h2>

                <!-- PASSWORD -->

                <div class="security-card">

                    <h3>
                        Change Password
                    </h3>

                    <div class="form-group">

                        <label>
                            Current Password
                        </label>

                        <input type="password">

                    </div>

                    <div class="form-group">

                        <label>
                            New Password
                        </label>

                        <input type="password">

                    </div>

                    <div class="form-group">

                        <label>
                            Confirm Password
                        </label>

                        <input type="password">

                    </div>

                    <button class="primary-btn">
                        Update Password
                    </button>

                </div>

                <!-- MFA -->

                <div class="security-card">

                    <h3>
                        Multi-Factor Authentication
                    </h3>

                    <div class="security-row">

                        <div>

                            <strong>
                                Authenticator App
                            </strong>

                            <p>
                                Recommended for maximum security
                            </p>

                        </div>

                        <label class="switch">

                            <input
                                type="checkbox"
                                checked
                            >

                            <span class="slider"></span>

                        </label>

                    </div>

                    <div class="security-row">

                        <div>

                            <strong>
                                Email Verification
                            </strong>

                            <p>
                                Verify important actions
                            </p>

                        </div>

                        <label class="switch">

                            <input
                                type="checkbox"
                                checked
                            >

                            <span class="slider"></span>

                        </label>

                    </div>

                </div>

                <!-- LOGIN HISTORY -->

                <div class="security-card">

                    <h3>
                        Recent Login Activity
                    </h3>

                    <div class="activity-item">

                        <span>
                            Chrome • Chennai
                        </span>

                        <strong>
                            Active Now
                        </strong>

                    </div>

                    <div class="activity-item">

                        <span>
                            Safari • iPhone
                        </span>

                        <strong>
                            2 Hours Ago
                        </strong>

                    </div>

                    <div class="activity-item">

                        <span>
                            Edge • Windows
                        </span>

                        <strong>
                            Yesterday
                        </strong>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="../../js/sidebar-loader.js"></script>
    <script src="../../js/settings-sidebar-loader.js"></script>

</body>

</html>
