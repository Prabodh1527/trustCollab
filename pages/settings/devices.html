<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TrustCollab AI - Devices</title>

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/settings.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-content">

        <div class="settings-container">

            <!-- Dynamic Settings Sub-Navigation Menu Container -->
            <div id="settings-sidebar-container"></div>

            <div class="settings-content">

                <h2 class="settings-heading">
                    Devices
                </h2>

                <!-- CURRENT DEVICE -->
                <div class="device-card current-device">
                    <div class="device-header">
                        <div>
                            <h3>
                                💻 Current Device
                            </h3>
                            <p>
                                Chrome • Windows 11 • Chennai
                            </p>
                        </div>
                        <span class="device-badge">
                            Active Now
                        </span>
                    </div>
                </div>

                <!-- OTHER DEVICES -->
                <div class="device-card">
                    <div class="device-header">
                        <div>
                            <h3>
                                📱 iPhone 15
                            </h3>
                            <p>
                                Safari • Chennai
                            </p>
                        </div>
                        <button class="danger-btn">
                            Revoke Access
                        </button>
                    </div>
                </div>

                <div class="device-card">
                    <div class="device-header">
                        <div>
                            <h3>
                                💻 MacBook Air
                            </h3>
                            <p>
                                Chrome • Bengaluru
                            </p>
                        </div>
                        <button class="danger-btn">
                            Revoke Access
                        </button>
                    </div>
                </div>

                <!-- SUSPICIOUS -->
                <div class="device-card suspicious-device">
                    <div class="device-header">
                        <div>
                            <h3>
                                ⚠ Unknown Device
                            </h3>
                            <p>
                                Firefox • Mumbai
                            </p>
                        </div>
                        <button class="danger-btn">
                            Remove Device
                        </button>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Scripts responsible for loading layouts on DOM Content Ready -->
    <script src="../../js/sidebar-loader.js"></script>
    <script src="../../js/settings-sidebar-loader.js"></script>

</body>

</html>
