<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustCollab AI - Profile</title>

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/settings.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-content">

        <div class="settings-container">

            <div id="settings-sidebar-container"></div>

            <div class="settings-content">

                <h2 class="settings-heading">
                    Profile Settings
                </h2>

                <div class="profile-card">

                    <div class="profile-top">

                        <div class="avatar-circle">
                            AK
                        </div>

                        <div>

                            <h3>
                                Arjun Kumar
                            </h3>

                            <p>
                                Project Administrator
                            </p>

                        </div>

                    </div>

                    <div class="profile-form">

                        <div class="form-group">

                            <label>
                                Full Name
                            </label>

                            <input
                                type="text"
                                value="Arjun Kumar"
                            >

                        </div>

                        <div class="form-group">

                            <label>
                                Email Address
                            </label>

                            <input
                                type="email"
                                value="arjun@example.com"
                            >

                        </div>

                        <div class="form-group">

                            <label>
                                Department
                            </label>

                            <input
                                type="text"
                                value="AI & Cloud Security"
                            >

                        </div>

                        <div class="form-group">

                            <label>
                                Role
                            </label>

                            <input
                                type="text"
                                value="Project Administrator"
                            >

                        </div>

                        <div class="form-group">

                            <label>
                                Bio
                            </label>

                            <textarea rows="4">Building TrustCollab AI workspace.</textarea>

                        </div>

                        <button class="primary-btn">
                            Save Changes
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="../../js/sidebar-loader.js"></script>
    <script src="../../js/settings-sidebar-loader.js"></script>

</body>

</html>
