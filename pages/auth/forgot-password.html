<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TrustCollab AI - Forgot Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                135deg,
                #EEF2FF,
                #F8FAFC
            );

        }

        .forgot-card{

            width:450px;

            background:white;

            padding:40px;

            border-radius:24px;

            box-shadow:
            0 20px 40px rgba(0,0,0,0.08);

        }

        .forgot-card h1{

            color:#4F46E5;

            margin-bottom:12px;

            text-align:center;

        }

        .forgot-card p{

            text-align:center;

            color:#64748B;

            margin-bottom:30px;

        }

        .input-group{

            margin-bottom:20px;

        }

        .input-group label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

            color:#334155;

        }

        .input-group input{

            width:100%;

            padding:14px;

            border:1px solid #CBD5E1;

            border-radius:12px;

            outline:none;

        }

        .input-group input:focus{

            border-color:#4F46E5;

        }

        .reset-btn{

            width:100%;

            padding:14px;

            border:none;

            background:#4F46E5;

            color:white;

            border-radius:12px;

            font-size:15px;

            font-weight:600;

            cursor:pointer;

        }

        .reset-btn:hover{

            background:#4338CA;

        }

        .back-link{

            margin-top:20px;

            text-align:center;

        }

        .back-link a{

            text-decoration:none;

            color:#4F46E5;

            font-weight:600;

        }

    </style>

</head>

<body>

    <div class="forgot-card">

        <h1>
            Forgot Password
        </h1>

        <p>
            Enter your registered email address
        </p>

        <form id="forgotForm">

            <div class="input-group">

                <label>
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    required
                >

            </div>

            <button
                type="submit"
                class="reset-btn"
            >
                Send Reset Link
            </button>

        </form>

        <div class="back-link">

            <a href="index.html">
                Back to Login
            </a>

        </div>

    </div>

<script>

    document
    .getElementById(
        "forgotForm"
    )
    .addEventListener(
        "submit",
        function(e){

            e.preventDefault();

            alert(
                "Password reset link has been sent to your email."
            );

            window.location.href =
            "index.html";

        }
    );

</script>

</body>

</html>
