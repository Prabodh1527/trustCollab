<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TrustCollab AI - OTP Verification</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                135deg,
                #EEF2FF,
                #F8FAFC
            );

        }

        .otp-card{

            width:450px;

            background:white;

            padding:40px;

            border-radius:24px;

            box-shadow:
            0 20px 40px rgba(0,0,0,0.08);

            text-align:center;

        }

        .otp-card h1{

            color:#4F46E5;

            margin-bottom:12px;

        }

        .otp-card p{

            color:#64748B;

            margin-bottom:30px;

        }

        .otp-container{

            display:flex;

            justify-content:center;

            gap:12px;

            margin-bottom:30px;

        }

        .otp-input{

            width:55px;
            height:60px;

            border:1px solid #CBD5E1;

            border-radius:12px;

            text-align:center;

            font-size:22px;

            font-weight:700;

            outline:none;

        }

        .otp-input:focus{

            border-color:#4F46E5;

        }

        .verify-btn{

            width:100%;

            padding:14px;

            border:none;

            background:#4F46E5;

            color:white;

            border-radius:12px;

            font-size:15px;

            font-weight:600;

            cursor:pointer;

        }

        .verify-btn:hover{

            background:#4338CA;

        }

        .resend{

            margin-top:20px;

            color:#64748B;

        }

        .resend a{

            text-decoration:none;

            color:#4F46E5;

            font-weight:600;

        }

        .timer{

            margin-top:15px;

            color:#EF4444;

            font-size:14px;

            font-weight:600;

        }

    </style>

</head>

<body>

    <div class="otp-card">

        <h1>
            Verify OTP
        </h1>

        <p>
            Enter the 6 digit code sent to your email
        </p>

        <div class="otp-container">

            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">

        </div>

        <button
            class="verify-btn"
            onclick="verifyOTP()"
        >
            Verify OTP
        </button>

        <div class="timer" id="timer">
            Resend OTP in 30s
        </div>

        <div class="resend">

            Didn't receive the code?

            <a href="#" onclick="resendOTP()">
                Resend OTP
            </a>

        </div>

    </div>

<script>

    const inputs =
    document.querySelectorAll(
        ".otp-input"
    );

    inputs.forEach(
        (input,index) => {

            input.addEventListener(
                "input",
                () => {

                    if(
                        input.value &&
                        inputs[index + 1]
                    ){

                        inputs[index + 1].focus();

                    }

                }
            );

        }
    );

    function verifyOTP(){

        let otp = "";

        inputs.forEach(input => {

            otp += input.value;

        });

        if(otp.length !== 6){

            alert(
                "Please enter all 6 digits"
            );

            return;

        }

        alert(
            "OTP Verified Successfully"
        );

        window.location.href =
        "index.html";

    }

    function resendOTP(){

        alert(
            "New OTP Sent Successfully"
        );

    }

    let time = 30;

    const timer =
    document.getElementById(
        "timer"
    );

    const interval =
    setInterval(() => {

        time--;

        timer.innerHTML =
        `Resend OTP in ${time}s`;

        if(time <= 0){

            clearInterval(
                interval
            );

            timer.innerHTML =
            "You can now resend OTP";

        }

    },1000);

</script>

</body>

</html>
